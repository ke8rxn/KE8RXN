name: Update SPS Placefile

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate placefile
        run: python update_sps_placefile.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force use of your PAT for push
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/ke8rxn/KE8RXN.git
          
          # Prevent "branch diverged" errors
          git pull --rebase origin main
          
          if git diff --quiet GRLevelX_SPS.txt; then
            echo "✅ No changes detected — nothing to commit."
          else
            git add GRLevelX_SPS.txt
            git commit -m "Auto-update SPS placefile"
            git push
            echo "✅ Changes detected and successfully pushed to GitHub!"
          fi
