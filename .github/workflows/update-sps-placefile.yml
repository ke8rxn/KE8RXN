name: Update SPS Placefile

on:
  schedule:
    - cron: '*/30 * * * *'     # fallback every 30 min (in case external fails)
  workflow_dispatch:           # ← This allows external triggering

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate placefile
        run: python update_sps_placefile.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet GRLevelX_SPS.txt; then
            echo "✅ No changes detected — nothing to commit."
          else
            git add GRLevelX_SPS.txt
            git commit -m "Auto-update SPS placefile"
            git push
            echo "✅ Changes detected and successfully pushed to GitHub!"
          fi
