name: Update FLW Placefile

on:
  schedule:
    - cron: '0 */6 * * *'     # every 6 hours
  workflow_dispatch:           # allow manual triggering

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate placefile
        run: python grlevelx_update_flw.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet GRLevelX_FLW.txt; then
            echo "✅ No changes detected — nothing to commit."
          else
            git add GRLevelX_FLW.txt
            git commit -m "Auto-update FLW placefile"
            git push
            echo "✅ Changes detected and successfully pushed to GitHub!"
          fi
