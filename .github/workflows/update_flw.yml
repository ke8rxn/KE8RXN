name: Update Flood Warning Placefile

on:
  schedule:
    - cron: '0 */6 * * *'     # Every 6 hours
  workflow_dispatch:           # Allows external triggering

permissions:
  contents: write

jobs:
  update-flw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Flood Warning script
        run: |
          python grlevelx_update_flw.py

      - name: Commit updated placefile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet GRLevelX_FLW.txt; then
            echo "✅ No changes detected — nothing to commit."
          else
            git add GRLevelX_FLW.txt
            git commit -m "Automated FLW placefile update"
            git pull --rebase
            git push
            echo "✅ Changes detected and successfully pushed to GitHub!"
          fi
